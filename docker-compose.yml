version: '3.9'

services:
  web:
    build: .
    container_name: exposaas
    restart: always
    ports:
      - "3001:3001"
      - "5000:5000"
    environment:
      NEXTAUTH_SECRET: "!2"
      DATABASE_URL: "postgresql://postgres:master@host.docker.internal:5432/exposaas?schema=public"
      AZURE_STORAGE_ACCOUNT_NAME: ""
      AZURE_STORAGE_ACCOUNT_KEY: ""
      AZURE_STORAGE_CONTAINER_NAME: ""
      NEXT_PUBLIC_WS_URL: "wss://exposaas.dndsol.co/ws/"
      GEMINI_API_KEY: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"
