version: '3.9'

services:
  web:
    build: .
    container_name: exposaas_app
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: exposaas_db
    restart: always
    environment:
      POSTGRES_USER: *****
      POSTGRES_PASSWORD: *****
      POSTGRES_DB: exposaas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
