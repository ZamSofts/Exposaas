name: CI/CD

on:
  push:
    branches: [main, shahmir]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_OPTIONS: '--max-old-space-size=4096'
  # Dummy values — prisma generate and next build need these but never connect
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'
  NEXTAUTH_SECRET: 'ci-dummy-secret'

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

  deploy:
    name: Deploy to Production
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          command_timeout: 8m
          script: |
            set -euo pipefail
            cd ${{ secrets.PROJECT_DIR }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building new image..."
            docker compose build

            echo "==> Restarting container..."
            docker compose up -d

            echo "==> Waiting for startup..."
            sleep 15

            echo "==> Syncing database schema..."
            docker exec exposaas npx prisma db push --accept-data-loss

            echo "==> Health check..."
            for i in 1 2 3 4 5; do
              if curl -sf --max-time 5 http://localhost:3001/api/auth/session > /dev/null 2>&1; then
                echo "Health check PASSED (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/5 failed, retrying in 10s..."
              sleep 10
            done

            echo "Health check FAILED"
            docker logs --tail 50 exposaas
            exit 1
